name: health_pal
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.4
  equatable: ^2.0.8
  firebase_core: ^3.12.1
