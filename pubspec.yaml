name: health_pal
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  equatable: ^2.0.8
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flex_color_scheme: ^8.4.0
  flutter:
    sdk: flutter
  flutter_auto_size_text: ^5.0.0
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.1
  flutter_map: ^8.3.0
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.0.10+1
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.3
  get_it: ^9.2.1
  go_router: ^17.2.1
  iconsax_latest: ^1.0.0
  image_picker: ^1.2.2
  injectable: ^3.0.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  latlong2: ^0.9.1
  lottie: ^3.3.1
  provider: ^6.1.5+1
  readmore: ^3.0.0
  shared_preferences: ^2.5.5
  skeletonizer: ^2.1.3
  smooth_page_indicator: ^2.0.1
  supabase_flutter: ^2.8.4
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  icons_launcher: ^3.1.0
  injectable_generator: ^3.0.2
  json_serializable: ^6.14.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  rename_app: ^1.6.6

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_18pt-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter/static/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/static/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/static/Inter_18pt-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500

flutter_native_splash:
  color: "#1C2A3A"
  image: assets/logo.png

  android_12:
    image: assets/logo.png
    icon_background_color: "#1C2A3A"

  web: false
