  flutter:
    sdk: flutter
  flutter_auto_size_text: ^5.0.0
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^5.2.1
  flutter_native_splash: ^2.4.7
  geolocator: ^13.0.2
  get_it: ^9.2.1
